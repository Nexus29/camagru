<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camagru | Creative Image Composition Platform</title>
    <meta name="description" content="A secure web application for capturing, editing, and sharing custom photo compositions.">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div id="app-root">
        <header class="app-header">
            <div class="header-container">
                <a href="/" class="app-logo" data-link>
                    <span class="logo-accent">Cama</span>gru
                </a>
                <nav class="app-nav" id="main-navigation">
                    <a href="/" class="nav-item active" data-link>Gallery</a>
                    <a href="/login" class="nav-item" id="auth-nav-link" data-link>Sign In</a>
                </nav>
            </div>
        </header>
        <main id="app" class="app-content-view">
            <div class="app-loading-spinner">
                <div class="spinner"></div>
                <p>Initializing Camagru workspace...</p>
            </div>
        </main>
        <footer class="app-footer">
            <div class="footer-container">
                <p>&copy; 2026 Camagru Ecosystem. Built with native web components.</p>
            </div>
        </footer>
        
    </div>
    <script type="module" src="/js/app.js"></script>
</body>
</html>
