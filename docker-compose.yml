services:
  backend:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    container_name: app_api
    restart: always
    env_file:
      - .env
    networks:
      - network
    depends_on:
      - database

  frontend:
    build:
      context: .
      dockerfile: ./docker/nginx/Dockerfile
    container_name: web_client
    restart: always
    ports:
      - "8080:80"
      - "443:443"
    depends_on:
      - backend
      - database
    networks:
      - network

  database:
    image: postgres:alpine
    container_name: db_postgres
    restart: always
    hostname: ${DB_HOST}
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - network

networks:
  network:
    driver: bridge

volumes:
  pg_data: