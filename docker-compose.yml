services:
  backend:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    container_name: app_api
    restart: always
    env_file:
      - .env
    volumes:
      - ./backend:/var/www/html/backend
      - camagru_uploads:/var/www/html/uploads_shared
    networks:
      - network
    depends_on:
      - database

  frontend:
    build:
      context: .
      dockerfile: ./docker/nginx/Dockerfile
    container_name: web_client
    restart: always
    ports:
      - "443:443"
      - "8080:80"
    links:
      - backend:php
    volumes:
      - ./frontend:/var/www/html/frontend
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - camagru_uploads:/var/www/html/frontend/uploads
    depends_on:
      - backend
      - database
    networks:
      - network

  database:
    image: postgres:alpine
    container_name: db_postgres
    restart: always
    hostname: ${DB_HOST}
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql
      - ./backend/config/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - network

  adminer:
    image: adminer:latest
    container_name: db_panel
    restart: always
    ports:
      - "8081:8080"
    depends_on:
      - database
    networks:
      - network

networks:
  network:
    driver: bridge

volumes:
  pg_data:
  camagru_uploads:
