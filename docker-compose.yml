services:
  camagru:
    image: php:8.2-fpm-alpine
    container_name: camagru_app
    volumes:
      - ./src:/var/www/html
    networks:
      - camagru_net

  webserver:
    image: nginx:alpine
    container_name: camagru_web
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - camagru 
    networks:
      - camagru_net 

networks:
  camagru_net:
    driver: bridge

volumes:
  pg_data: