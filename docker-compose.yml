services:
  camagru:
    build:
      context: .
      dockerfile_inline: |
        FROM php:8.2-fpm-alpine
        # Install native system dependencies for PostgreSQL and GD Graphics Library
        RUN apk add --no-cache libpq-dev libpng-dev libjpeg-turbo-dev freetype-dev \
            && docker-php-ext-configure gd --with-freetype --with-jpeg \
            && docker-php-ext-install pdo_pgsql gd
    container_name: app
    env_file:
      - .env
    volumes:
      - ./backend:/var/www/html/backend
    networks:
      - camagru_net
    depends_on:
      - database
      - mailhog
    command: >
      sh -c "mkdir -p /var/www/html/backend/uploads/overlays && chmod -R 777 /var/www/html/backend/uploads && php-fpm"  
  
  webserver:
    image: nginx:alpine
    container_name: web
    ports:
      - "${APP_PORT}:80"
      - "8443:443"
    volumes:
      - ./frontend:/var/www/html/frontend
      - ./backend:/var/www/html/backend
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - camagru
      - database
    networks:
      - camagru_net

  database:
    image: postgres:alpine
    container_name: db
    hostname: ${DB_HOST}
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backend/config/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - camagru_net

  adminer:
    image: adminer
    container_name: adminer
    ports:
      - "8081:8080"
    depends_on:
      - database
    networks:
      - camagru_net

  mailhog:
    image: mailhog/mailhog
    container_name: camagru-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - camagru_net

networks:
  camagru_net:
    driver: bridge

volumes:
  pg_data:
